name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build, Test and Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build native pbivnorm library
        run: |
          mkdir -p src/main/resources/native/linux-x86_64
          gfortran -shared -fPIC -O2 -std=legacy -ffixed-line-length-none \
            src/main/fortran/pbivnorm.f \
            -o src/main/resources/native/linux-x86_64/libpbivnorm.so

      - name: Verify
        run: ./mvnw verify

      - name: Verify Linux library is packaged
        run: |
          mainJar="$(find thegreeklab-core/target -maxdepth 1 -name 'thegreeklab-*.jar' \
            ! -name '*-sources.jar' ! -name '*-javadoc.jar' | head -n 1)"
          test -n "$mainJar"
          jar tf "$mainJar" | grep -Fx "native/linux-x86_64/libpbivnorm.so"

      - name: Validate release POM coordinates
        run: |
          releaseVersion="$(sed -n 's#.*<revision>\(.*\)-SNAPSHOT</revision>.*#\1#p' pom.xml)"
          test -n "$releaseVersion"
          bash scripts/validate-release-poms.sh "$releaseVersion"

      - name: Archive JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: thegreeklab-core/target/site/jacoco
          if-no-files-found: error

      - name: Upload coverage to Codacy
        if: github.event_name == 'push' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]')
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: thegreeklab-core/target/site/jacoco/jacoco.xml

  windows-native-smoke:
    name: Windows bundled DLL smoke test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
          cache: maven

      - name: Build JAR and test bundled DLL
        shell: pwsh
        env:
          THEGREEKLAB_PBIVNORM_PATH: ""
        run: .\mvnw.cmd -B -ntp "-Dtest=BivariateNormalTest" "-Dsurefire.failIfNoSpecifiedTests=false" package

      - name: Verify DLL is packaged
        shell: pwsh
        run: |
          $mainJar = Get-ChildItem thegreeklab-core\target\thegreeklab-*.jar |
            Where-Object { $_.Name -notmatch '-(sources|javadoc)\.jar$' } |
            Select-Object -First 1

          if ($null -eq $mainJar) {
            throw "Main thegreeklab JAR was not created."
          }

          $entries = & jar tf $mainJar.FullName
          if ($LASTEXITCODE -ne 0) {
            throw "Could not inspect $($mainJar.Name)."
          }

          if ($entries -notcontains "native/windows-x86_64/pbivnorm.dll") {
            throw "Bundled pbivnorm.dll is missing from $($mainJar.Name)."
          }

  macos-native-smoke:
    name: macOS bundled dylib smoke test (${{ matrix.architecture }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            architecture: x86_64
          - runner: macos-14
            architecture: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Install Fortran compiler
        run: |
          if ! command -v gfortran >/dev/null 2>&1; then
            brew install gcc
          fi
          compiler="$(command -v gfortran || true)"
          if [ -z "$compiler" ]; then
            compiler="$(find "$(brew --prefix gcc)/bin" -maxdepth 1 -type f -name 'gfortran-*' | sort | tail -n 1)"
          fi
          test -n "$compiler"
          echo "GFORTRAN=$compiler" >> "$GITHUB_ENV"

      - name: Build native pbivnorm library
        run: |
          resourceDirectory="src/main/resources/native/macos-${{ matrix.architecture }}"
          mkdir -p "$resourceDirectory"
          "$GFORTRAN" -dynamiclib -O2 -std=legacy -ffixed-line-length-none \
            -static-libgfortran -static-libquadmath -static-libgcc \
            src/main/fortran/pbivnorm.f \
            -o "$resourceDirectory/libpbivnorm.dylib"
          otool -L "$resourceDirectory/libpbivnorm.dylib"
          if otool -L "$resourceDirectory/libpbivnorm.dylib" \
            | grep -E 'libgfortran|libquadmath|/opt/homebrew|/usr/local/opt'; then
            echo "The bundled dylib must not depend on a Homebrew runtime." >&2
            exit 1
          fi

      - name: Build JAR and test bundled dylib
        env:
          THEGREEKLAB_PBIVNORM_PATH: ""
        run: ./mvnw -B -ntp "-Dtest=BivariateNormalTest" "-Dsurefire.failIfNoSpecifiedTests=false" package

      - name: Verify dylib is packaged
        run: |
          mainJar="$(find thegreeklab-core/target -maxdepth 1 -name 'thegreeklab-*.jar' \
            ! -name '*-sources.jar' ! -name '*-javadoc.jar' | head -n 1)"
          test -n "$mainJar"
          jar tf "$mainJar" | grep -Fx "native/macos-${{ matrix.architecture }}/libpbivnorm.dylib"
