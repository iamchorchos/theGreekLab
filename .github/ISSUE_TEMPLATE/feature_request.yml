name: Feature request
description: Propose a focused improvement to the library
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What problem would this change solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, model or workflow you have in mind.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: Mathematical or technical references
      description: Link primary sources for new pricing models, formulas or algorithms.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe workarounds or other designs you considered.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for a similar proposal.
          required: true

